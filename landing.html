<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --dark:#071826;
  --dark2:#0A1F33;
  --gold:#C9A24D;
  --gold-l:#E6C76B;
  --cream:#F5F5F5;
  --muted:#A0B4C0;
  --accent:#C9A24D;
}
html,body{height:100%;}
body{
  background:linear-gradient(180deg,#071826 0%,#0A1F33 100%);
  color:var(--cream);
  font-family:"Montserrat",sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1.25rem;
  text-align:center;
  overflow-x:hidden;
}
.wrap{
  width:100%;
  max-width:840px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2.2rem;
}
/* HERO MOBILE — video del pulpo (solo ≤767px) */
.hero-mobile{
  position:relative;
  width:100%;
  max-width:480px;
  margin:0 auto;
  border-radius:20px;
  overflow:hidden;
  isolation:isolate;
  aspect-ratio:9/16;
  max-height:70vh;
  background:var(--dark);
  animation:fadeIn 1s ease both;
}
.hero-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.hero-overlay{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at center bottom,transparent 30%,rgba(7,24,38,.65) 90%),linear-gradient(180deg,transparent 60%,rgba(7,24,38,.5) 100%);
  pointer-events:none;
  z-index:1;
}
.hero-content{
  position:absolute;
  bottom:1.5rem;
  left:0;
  right:0;
  z-index:2;
  text-align:center;
  padding:0 1.5rem;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.35rem;
}
.brand-eyebrow{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(.75rem,2.4vw,.95rem);
  letter-spacing:.45em;
  text-transform:uppercase;
  color:rgba(245,245,245,.85);
  text-shadow:0 2px 12px rgba(7,24,38,.85);
  animation:fadeUp 1s .4s ease both;
}
.hero-mobile-title{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(2.6rem,11vw,4.5rem);
  letter-spacing:.1em;
  line-height:.9;
  color:var(--cream);
  text-shadow:0 4px 24px rgba(7,24,38,.75);
  animation:fadeUp 1s .55s ease both;
}
.hero-mobile-tagline{
  font-family:"Montserrat",sans-serif;
  font-style:italic;
  font-size:clamp(.85rem,2.4vw,1.05rem);
  letter-spacing:.32em;
  color:var(--gold);
  text-shadow:0 2px 12px rgba(7,24,38,.75);
  animation:fadeUp 1s .7s ease both;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

.brand-logo{
  width:clamp(80px,14vw,120px);
  height:auto;
  animation:fadeUp 1s ease both;
}
.brand{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.4rem;
}
.brand-title{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(3.2rem,12vw,6rem);
  letter-spacing:.08em;
  line-height:.88;
  color:var(--cream);
  animation:fadeUp 1s .1s ease both;
}
.brand-sub{
  font-family:"Montserrat",sans-serif;
  font-style:italic;
  font-size:clamp(.85rem,2.4vw,1.15rem);
  color:var(--accent);
  letter-spacing:.35em;
  animation:fadeUp 1s .2s ease both;
}
.guide{
  font-family:"Bebas Neue",sans-serif;
  font-size:.78rem;
  letter-spacing:.55em;
  text-transform:uppercase;
  color:var(--muted);
  animation:fadeUp 1s .3s ease both;
}
.branches{
  display:flex;
  flex-direction:column;
  gap:1rem;
  width:100%;
  max-width:480px;
  animation:fadeUp 1s .4s ease both;
}
.branch-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.35rem;
  min-height:88px;
  padding:1.2rem 1.6rem;
  background:rgba(10,31,51,.55);
  border:1.5px solid rgba(201,162,77,.35);
  border-radius:16px;
  color:var(--cream);
  text-decoration:none;
  cursor:pointer;
  transition:all .35s cubic-bezier(.23,1,.32,1);
  -webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.branch-btn:hover,.branch-btn:focus-visible{
  background:rgba(201,162,77,.12);
  border-color:var(--gold);
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(201,162,77,.22);
  outline:none;
}
.branch-btn:active{transform:translateY(0);}
.branch-name{
  font-family:"Bebas Neue",sans-serif;
  font-size:1.6rem;
  letter-spacing:.18em;
  color:var(--gold);
}
.branch-meta{
  font-size:.78rem;
  color:var(--muted);
  letter-spacing:.05em;
  font-weight:400;
}
.footer{
  margin-top:1rem;
  font-size:.7rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--muted);
  opacity:.7;
  animation:fadeUp 1s .5s ease both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
/* Mobile (≤767px): mostrar hero del pulpo, ocultar branding clásico */
@media (max-width:767px){
  .brand-logo,.brand{display:none;}
}
/* Desktop (≥768px): ocultar hero mobile, mostrar branding clásico */
@media (min-width:768px){
  .hero-mobile{display:none;}
  .branches{flex-direction:row;max-width:720px;}
  .branch-btn{flex:1;min-height:140px;padding:1.6rem 1.4rem;}
  .branch-name{font-size:1.85rem;}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
}

<script>

  window.addEventListener("load", function(){
    navigator.serviceWorker.register("/sw.js").catch(function(){});
  });
}
// Pausar video del hero en conexiones lentas o save-data
(function(){
  if (!navigator.connection) return;
  var c = navigator.connection;
  if (c.saveData === true || c.effectiveType === "slow-2g" || c.effectiveType === "2g") {
    var v = document.querySelector(".hero-video");
    if (v) { v.removeAttribute("autoplay"); v.pause(); }
  }
})();
