.branches {

  border-bottom: 0.5px solid var(--line);

.branch:active {

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("/sw.js").catch(function(){});
  });
}
// Pausar video del hero en conexiones lentas o save-data
(function(){
  if (!navigator.connection) return;
  var c = navigator.connection;
  if (c.saveData === true || c.effectiveType === "slow-2g" || c.effectiveType === "2g") {
    var v = document.querySelector(".hero-video");
    if (v) { v.removeAttribute("autoplay"); v.pause(); }
  }
})();

// Botones de sucursal: haptic feedback + fade-out de salida
(function(){
  var branches = document.querySelectorAll(".branch");
  branches.forEach(function(branch){
    branch.addEventListener("touchstart", function(){
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(8);
      }
    }, { passive: true });

    branch.addEventListener("click", function(e){
      e.preventDefault();
      var href = this.getAttribute("href");
      document.body.style.transition = "opacity 0.35s ease";
      document.body.style.opacity = "0";
      setTimeout(function(){ window.location.href = href; }, 320);
    });
  });
})();
</script>
